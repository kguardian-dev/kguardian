# Default values for kguardian.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.
global:
  # -- Labels to apply to all resources
  labels: {}
  # -- Annotations to apply to all resources
  annotations: {}

  # -- Priority class to be used for the kguardian pods
  priorityClassName: ""

namespace:
  # -- Namespace name. If empty, uses the release namespace
  name: ""
  # -- Labels to add to the namespace
  labels: {}
  # -- Annotations to add to the namespace
  annotations: {}

controller:
  image:
    # -- Controller container image repository
    repository: ghcr.io/kguardian-dev/kguardian/controller
    # -- Controller image pull policy
    pullPolicy: IfNotPresent
    # -- Controller version tag (auto-updated by release-please)
    tag: "1.8.1"
    # -- Overrides the image tag using SHA digest
    sha: ""
  initContainer:
    image:
      # -- Init container image repository
      repository: busybox
      # -- Init container image pull policy
      pullPolicy: Always
      # -- Init container image tag
      tag: latest
    # -- Init container security context
    securityContext:
      runAsNonRoot: true
      runAsUser: 65534
      readOnlyRootFilesystem: true
      allowPrivilegeEscalation: false
      capabilities:
        drop:
          - ALL

  # -- List of image pull secrets for private registries
  imagePullSecrets: []
  # -- Override the name of the controller resources
  nameOverride: ""
  # -- Override the full name of the controller resources
  fullnameOverride: ""

  serviceAccount:
    # -- Specifies whether a service account should be created
    create: true
    # -- Annotations to add to the service account
    annotations: {}
    # -- The name of the service account to use. If not set and create is true, a name is generated using the fullname template
    name: ""
    # -- Automount API credentials for a service account (controller needs K8s API access)
    automountServiceAccountToken: true

  # -- Annotations to add to controller pods
  podAnnotations: {}

  # -- Controller pod security context. Runs with seccomp RuntimeDefault profile
  podSecurityContext:
    # runAsUser: 1000
    # runAsGroup: 1000
    # fsGroup: 1000
    # fsGroupChangePolicy: OnRootMismatch
    # supplementalGroups: [1000]
    seccompProfile:
      type: RuntimeDefault

  # -- Controller container security context. Requires privileged mode for eBPF
  securityContext:
    privileged: true
    readOnlyRootFilesystem: true
    capabilities:
      add:
      - CAP_BPF
    allowPrivilegeEscalation: true

  service:
    # -- Controller service type
    type: ClusterIP
    # -- Controller service port
    port: 80

  # -- Controller pod resource requests and limits. eBPF requires more memory.
  resources:
    limits:
      # cpu: 500m
      memory: 512Mi
    requests:
      cpu: 100m
      memory: 256Mi

  autoscaling:
    # -- Enable horizontal pod autoscaling for controller
    enabled: false
    # -- Minimum number of controller replicas
    minReplicas: 1
    # -- Maximum number of controller replicas
    maxReplicas: 100
    # -- Target CPU utilization percentage for autoscaling
    targetCPUUtilizationPercentage: 80
    # targetMemoryUtilizationPercentage: 80

  # -- Node labels for the kguardian controller pod assignment
  nodeSelector:
    kubernetes.io/os: linux

  # -- Tolerations for the kguardian controller pod assignment
  tolerations:
  - key: "node-role.kubernetes.io/control-plane"
    operator: "Exists"
    effect: "NoSchedule"

  # -- Affinity rules for controller pod assignment
  affinity: {}

  # -- Priority class to be used for the kguardian controller pods
  priorityClassName: ""

  # -- Path to the containerd socket on the host node.
  # For k3s clusters, set to: /run/k3s/containerd/containerd.sock
  containerdSockPath: /run/containerd/containerd.sock

  # -- Path to the containerd runtime bundle directory on the host node.
  # For k3s clusters, set to: /run/k3s/containerd/io.containerd.runtime.v2.task
  containerdBundlePath: /run/containerd/io.containerd.runtime.v2.task

  # -- Namespaces to be excluded from monitoring (comma-separated list)
  excludedNamespaces:
    - kguardian
    - kube-system

  # -- Ignore traffic from daemonset pods to reduce noise
  ignoreDaemonSet: true

broker:
  # -- Number of broker replicas to deploy
  replicaCount: 1
  image:
    # -- Broker container image repository
    repository: ghcr.io/kguardian-dev/kguardian/broker
    # -- Broker image pull policy
    pullPolicy: IfNotPresent
    # -- Broker version tag (auto-updated by release-please)
    tag: "1.9.0"
    # -- Overrides the image tag using SHA digest
    sha: ""
  initContainer:
    image:
      # -- Broker init container image repository
      repository: busybox
      # -- Broker init container image pull policy
      pullPolicy: Always
      # -- Broker init container image tag
      tag: latest
      # -- Overrides the init container image tag using SHA digest
      sha: ""
    # -- Broker init container security context
    securityContext:
      runAsNonRoot: true
      runAsUser: 65534
      readOnlyRootFilesystem: true
      allowPrivilegeEscalation: false
      capabilities:
        drop:
          - ALL

  container:
    # -- Broker container port
    port: 9090

  # -- List of image pull secrets for private registries
  imagePullSecrets: []
  # -- Override the name of the broker resources
  nameOverride: ""
  # -- Override the full name of the broker resources
  fullnameOverride: ""

  serviceAccount:
    # -- Specifies whether a service account should be created
    create: true
    # -- Annotations to add to the service account
    annotations: {}
    # -- The name of the service account to use. If not set and create is true, a name is generated using the fullname template
    name: ""
    # -- Automount API credentials for a service account
    automountServiceAccountToken: false

  # -- Annotations to add to broker pods
  podAnnotations: {}

  # -- Broker pod security context. Runs as non-root user 1000
  podSecurityContext:
    runAsUser: 1000
    runAsGroup: 1000
    fsGroup: 1000
    fsGroupChangePolicy: OnRootMismatch
    supplementalGroups: [1000]
    seccompProfile:
      type: RuntimeDefault

  # -- Broker container security context. Hardened with read-only root filesystem
  securityContext:
    privileged: false
    capabilities:
      drop:
      - ALL
    readOnlyRootFilesystem: true
    runAsNonRoot: true
    runAsUser: 1000
    allowPrivilegeEscalation: false

  service:
    # -- Broker service name
    name: "kguardian-broker"
    # -- Broker service type
    type: ClusterIP
    # -- Broker service port
    port: 9090

  # -- Broker pod resource requests and limits
  resources:
    limits:
      # cpu: 500m
      memory: 1Gi
    requests:
      cpu: 100m
      memory: 256Mi

  autoscaling:
    # -- Enable horizontal pod autoscaling for broker
    enabled: false
    # -- Minimum number of broker replicas
    minReplicas: 1
    # -- Maximum number of broker replicas
    maxReplicas: 100
    # -- Target CPU utilization percentage for autoscaling
    targetCPUUtilizationPercentage: 80
    # targetMemoryUtilizationPercentage: 80

  # -- Node labels for the kguardian broker pod assignment
  nodeSelector:
    kubernetes.io/os: linux

  # -- Tolerations for the kguardian broker pod assignment
  tolerations: []

  # -- Affinity rules for broker pod assignment
  affinity: {}

  # -- Priority class to be used for the kguardian broker pods
  priorityClassName: ""

  audit:
    retention:
      # -- Retain audit_verdicts rows for this many days. Older rows are
      # pruned by a tokio task in the broker that wakes every
      # `intervalSeconds`. Set to 0 to disable retention entirely
      # (table grows unbounded).
      days: 30
      # -- How often the cleanup pass runs, in seconds. Minimum 60.
      intervalSeconds: 3600
    # -- Maximum concurrent in-flight /evaluate calls to the audit
    # evaluator. Bound prevents an ingest spike from creating
    # unbounded concurrent reqwest futures + connection-pool waiters.
    # The broker's /metrics exposes broker_audit_inflight_available
    # so operators can spot saturation. The metrics doc suggests
    # bumping this value when the gauge sits at 0 (under sustained
    # load you'll see "evaluator round-trips queueing"). In-broker
    # default is 16 if unset; minimum is 1.
    inflightPermits: 16
    # -- Per-call timeout (in milliseconds) on the broker's POST to
    # the evaluator's /evaluate endpoint. 500ms is plenty for an
    # in-cluster evaluator (matcher is in-memory, sub-ms) but operators
    # running the evaluator across cells / regions / VPNs may need
    # more. Clamped to a minimum 50ms broker-side.
    evalTimeoutMs: 500

  # -- r2d2 connection-pool max_size. r2d2's own default is 10, which
  # is the bottleneck under heavy ingest: each audit evaluator
  # round-trip and each regular request handler needs a pool
  # connection. 16 here matches audit.inflightPermits for parity.
  # Tune up when broker logs show "could not get db conn for audit
  # verdict insert" warns or when /metrics shows pool-acquire stalls.
  dbPoolMaxSize: 16

  # -- Number of attempts the broker makes to run embedded migrations
  # on startup, at 2s spacing. The chart's wait-for-db init container
  # handles "DB not started" via TCP probe — this loop absorbs the
  # gap between TCP-ready and postgres-accepting-queries (10-30s on
  # slow / small nodes during initdb). 10 attempts ≈ 20s budget. Bump
  # when broker crash-loops with "DB migration attempt N/10 failed"
  # before postgres finishes warming up. Min 1.
  dbMigrationMaxRetries: 10

  # -- Startup probe. Empty by default — opt in when slow startup is expected
  # (e.g. cold image pull on small nodes). Replaces the default startup probe.
  startupProbe: {}
  # Example:
  # startupProbe:
  #   httpGet: { path: /health, port: http }
  #   failureThreshold: 30
  #   periodSeconds: 10

  # -- Topology spread constraints applied to broker pods. Useful when running
  # multiple replicas across zones/nodes. See
  # https://kubernetes.io/docs/concepts/scheduling-eviction/topology-spread-constraints/
  topologySpreadConstraints: []
  # Example:
  # - maxSkew: 1
  #   topologyKey: kubernetes.io/hostname
  #   whenUnsatisfiable: ScheduleAnyway
  #   labelSelector:
  #     matchLabels:
  #       app.kubernetes.io/name: kguardian-broker

  podDisruptionBudget:
    # -- Create a PodDisruptionBudget for the broker. Defaults to false; enable
    # when running >1 replica so voluntary evictions can't take all of them out.
    enabled: false
    # -- Either minAvailable or maxUnavailable can be set (not both).
    # Accepts integer or percentage string ("50%").
    minAvailable: 1
    maxUnavailable: ""

  metrics:
    serviceMonitor:
      # -- Create a ServiceMonitor for prometheus-operator. The broker
      # exposes a Prometheus text-format /metrics endpoint with five
      # gauges/counter:
      #   broker_db_schema_ready, broker_db_reachable,
      #   broker_audit_enabled, broker_audit_inflight_available,
      #   broker_db_pool_idle, broker_db_pool_max,
      #   broker_uptime_seconds
      # Suggested alerts:
      #   - broker_db_schema_ready == 0 for 5m   → silent failure mode
      #   - broker_db_reachable == 0 for 1m      → DB connection issue
      #   - broker_audit_inflight_available == 0 for 10m → bump
      #     broker.audit.inflightPermits (default 16)
      #   - broker_db_pool_idle == 0 for 10m     → bump
      #     broker.dbPoolMaxSize (default 16)
      enabled: false
      # -- Endpoint path on the broker's HTTP service.
      path: /metrics
      # -- Service port name to scrape.
      port: http
      # -- Scrape interval.
      interval: 30s
      # -- Scrape timeout.
      scrapeTimeout: 10s
      # -- Extra labels to add to the ServiceMonitor (so prometheus-operator
      # picks it up — usually `release: kube-prometheus-stack`).
      labels: {}

  helmTest:
    # -- Render a `helm.sh/hook: test` Pod that probes the broker's
    # /health endpoint after install/upgrade. /health verifies schema
    # state (kguardian-dev/kguardian#876), so a passing test confirms
    # the broker can reach the database AND its migrations have run.
    # Run with `helm test <release>`.
    enabled: true

database:
  # -- Deploy the bundled in-cluster PostgreSQL. Set false to use an external
  # PostgreSQL — populate `database.external.host` and provide credentials via
  # `database.existingSecret`.
  enabled: true

  # -- PostgreSQL role used by the broker. Must exist on external Postgres.
  user: rust
  # -- Database name used by the broker. Must exist on external Postgres.
  databaseName: kube

  # -- Existing Secret containing the DB password under the key configured by
  # `database.passwordSecretKey`. When empty AND `database.enabled=true`, the
  # chart provisions a Secret named "kguardian-db-credentials" with a random
  # password (regenerated only on first install).
  existingSecret: ""
  # -- Secret data key holding the DB password.
  passwordSecretKey: password

  # External PostgreSQL connection. Used only when `database.enabled=false`.
  external:
    # -- Hostname or FQDN of the external PostgreSQL instance, e.g.
    # "postgres.databases.svc.cluster.local" or "db.example.com". Required
    # when `database.enabled=false`.
    host: ""
    # -- Port of the external PostgreSQL instance.
    port: 5432
    # -- libpq sslmode for the external connection (disable | allow | prefer
    # | require | verify-ca | verify-full). Cloud-managed Postgres typically
    # requires "require" or stricter.
    sslMode: prefer

  # -- Object name for the in-cluster Database deployment / PVC / SA. Only
  # used when `database.enabled=true`.
  name: kguardian-db
  image:
    # -- PostgreSQL container image repository
    repository: postgres
    # -- PostgreSQL image pull policy
    pullPolicy: IfNotPresent
    # -- PostgreSQL image tag (pinned; bump deliberately).
    # @breaking 18-alpine: PostgreSQL major-version data dirs are not
    # forward-compatible. Existing PG15 PersistentVolumeClaims must be
    # migrated with pg_upgrade or dropped before upgrading. See
    # charts/kguardian/UPGRADING.md.
    tag: "18-alpine"
    # -- Overrides the image tag using SHA digest
    sha: ""

  persistence:
    # -- Enable persistent storage for database. Defaults to true; set to false only for ephemeral testing.
    enabled: true
    # -- Use an existing PersistentVolumeClaim instead of creating a new one. When unset, the chart provisions a PVC named "{{ database.name }}-data".
    existingClaim: ""
    # -- Size of the auto-provisioned PVC (only used when existingClaim is unset)
    size: "10Gi"
    # -- StorageClass for the auto-provisioned PVC (only used when existingClaim is unset). Empty string uses the cluster's default StorageClass.
    storageClassName: ""
    # -- Refuse to start the database when the PVC contains an unrelated
    # PostgreSQL data directory (e.g. PG15 layout from before chart 1.10.0)
    # AND the current major's directory is empty. The default postgres
    # image would silently `initdb` over the empty location and the
    # operator would only notice once the schema came up empty.
    #
    # Set to false to bypass the check — for example, when intentionally
    # promoting from one major to another after running `pg_upgrade`
    # offline. See charts/kguardian/UPGRADING.md.
    safeBoot: true
    # -- Run a pg_dumpall as a Helm pre-upgrade/pre-rollback hook before
    # each chart upgrade. The dump is printed to the Job's stdout —
    # retrieve with `kubectl logs job/<database.name>-pre-upgrade-backup`
    # or pipe to your existing log-aggregation backup pipeline.
    #
    # Best-effort: a failed backup is logged but does NOT block the
    # upgrade. Set to false to skip entirely (e.g. for ephemeral test
    # deployments).
    preUpgradeBackup: true

  container:
    # -- PostgreSQL container port
    port: 5432

  # -- List of image pull secrets for private registries
  imagePullSecrets: []
  # -- Override the name of the database resources
  nameOverride: ""
  # -- Override the full name of the database resources
  fullnameOverride: ""

  serviceAccount:
    # -- Specifies whether a service account should be created
    create: true
    # -- Annotations to add to the service account
    annotations: {}
    # -- The name of the service account to use. If not set and create is true, a name is generated using the fullname template
    name: ""
    # -- Automount API credentials for a service account
    automountServiceAccountToken: false

  # -- Annotations to add to database pods
  podAnnotations: {}

  # -- Database pod security context. Runs as postgres user (999)
  podSecurityContext:
    runAsUser: 999
    runAsGroup: 999
    fsGroup: 999
    fsGroupChangePolicy: OnRootMismatch
    supplementalGroups: [999]
    seccompProfile:
      type: RuntimeDefault

  # -- Database container security context. Non-root with dropped capabilities
  securityContext:
    privileged: false
    capabilities:
      drop:
      - ALL
    readOnlyRootFilesystem: false
    runAsNonRoot: true
    runAsUser: 999
    allowPrivilegeEscalation: false

  service:
    # -- Database service name
    name: "kguardian-db"
    # -- Database service type
    type: ClusterIP
    # -- Database service port
    port: 5432

  # -- Database pod resource requests and limits
  resources:
    limits:
      # cpu: 500m
      memory: 512Mi
    requests:
      cpu: 100m
      memory: 256Mi

  autoscaling:
    # -- Enable horizontal pod autoscaling for database
    enabled: false
    # -- Minimum number of database replicas
    minReplicas: 1
    # -- Maximum number of database replicas
    maxReplicas: 100
    # -- Target CPU utilization percentage for autoscaling
    targetCPUUtilizationPercentage: 80
    # targetMemoryUtilizationPercentage: 80

  # -- Node labels for the kguardian database pod assignment
  nodeSelector:
    kubernetes.io/os: linux

  # -- Tolerations for the kguardian database pod assignment
  tolerations: []

  # -- Affinity rules for database pod assignment
  affinity: {}

  # -- Priority class to be used for the kguardian database pods
  priorityClassName: ""

frontend:
  # -- Number of frontend replicas to deploy
  replicaCount: 1
  image:
    # -- Frontend container image repository
    repository: ghcr.io/kguardian-dev/kguardian/frontend
    # -- Frontend image pull policy
    pullPolicy: IfNotPresent
    # -- Frontend version tag (auto-updated by release-please)
    tag: "1.9.0"
    # -- Overrides the image tag using SHA digest
    sha: ""

  container:
    # -- Frontend container port (serve)
    port: 5173

  # -- List of image pull secrets for private registries
  imagePullSecrets: []
  # -- Override the name of the frontend resources
  nameOverride: ""
  # -- Override the full name of the frontend resources
  fullnameOverride: ""

  serviceAccount:
    # -- Specifies whether a service account should be created
    create: true
    # -- Annotations to add to the service account
    annotations: {}
    # -- The name of the service account to use. If not set and create is true, a name is generated using the fullname template
    name: ""
    # -- Automount API credentials for a service account
    automountServiceAccountToken: false

  # -- Annotations to add to frontend pods
  podAnnotations: {}

  # -- Frontend pod security context. Runs as non-root user (1337)
  podSecurityContext:
    runAsUser: 1337
    runAsGroup: 1337
    fsGroup: 1337
    fsGroupChangePolicy: OnRootMismatch
    supplementalGroups: [1337]
    seccompProfile:
      type: RuntimeDefault

  # -- Frontend container security context. Hardened with read-only root filesystem
  securityContext:
    privileged: false
    capabilities:
      drop:
      - ALL
    readOnlyRootFilesystem: false
    runAsNonRoot: true
    runAsUser: 1337
    allowPrivilegeEscalation: false

  service:
    # -- Frontend service name
    name: "kguardian-frontend"
    # -- Frontend service type
    type: ClusterIP
    # -- Frontend service port
    port: 5173

  # -- Frontend pod resource requests and limits
  resources:
    limits:
      # cpu: 200m
      memory: 256Mi
    requests:
      cpu: 50m
      memory: 128Mi

  autoscaling:
    # -- Enable horizontal pod autoscaling for frontend
    enabled: false
    # -- Minimum number of frontend replicas
    minReplicas: 1
    # -- Maximum number of frontend replicas
    maxReplicas: 100
    # -- Target CPU utilization percentage for autoscaling
    targetCPUUtilizationPercentage: 80
    # targetMemoryUtilizationPercentage: 80

  # -- Node labels for the kguardian frontend pod assignment
  nodeSelector:
    kubernetes.io/os: linux

  # -- Tolerations for the kguardian frontend pod assignment
  tolerations: []

  # -- Affinity rules for frontend pod assignment
  affinity: {}

  # -- Priority class to be used for the kguardian frontend pods
  priorityClassName: ""

  # -- Startup probe. Empty by default — opt in when slow startup is expected.
  startupProbe: {}

  # -- Topology spread constraints applied to frontend pods.
  topologySpreadConstraints: []

  podDisruptionBudget:
    # -- Create a PodDisruptionBudget for the frontend. Defaults to false;
    # enable when running >1 replica.
    enabled: false
    minAvailable: 1
    maxUnavailable: ""

  metrics:
    serviceMonitor:
      # -- Create a ServiceMonitor for prometheus-operator. The frontend
      # does not currently expose /metrics — forward-compatible toggle.
      enabled: false
      path: /metrics
      port: http
      interval: 30s
      scrapeTimeout: 10s
      labels: {}

  ingress:
    # -- Enable ingress for frontend
    enabled: false
    # -- Ingress class name
    className: ""
    # -- Ingress annotations
    annotations: {}
      # kubernetes.io/ingress.class: nginx
      # cert-manager.io/cluster-issuer: letsencrypt-prod
    # -- Ingress hosts configuration
    hosts:
      - host: kguardian.example.com
        paths:
          - path: /
            pathType: Prefix
    # -- Ingress TLS configuration
    tls: []
    #  - secretName: kguardian-tls
    #    hosts:
    #      - kguardian.example.com
llmBridge:
  # -- Enable LLM Bridge service for AI assistant
  enabled: false
  # -- Number of llm-bridge replicas to deploy
  replicaCount: 2
  image:
    # -- LLM Bridge container image repository
    repository: ghcr.io/kguardian-dev/kguardian/llm-bridge
    # -- LLM Bridge image pull policy
    pullPolicy: IfNotPresent
    # -- LLM Bridge version tag (auto-updated by release-please)
    tag: "1.2.3"
    # -- Overrides the image tag using SHA digest
    sha: ""

  container:
    # -- LLM Bridge container port
    port: 8080

  # -- List of image pull secrets for private registries
  imagePullSecrets: []
  # -- Override the name of the llm-bridge resources
  nameOverride: ""
  # -- Override the full name of the llm-bridge resources
  fullnameOverride: ""

  serviceAccount:
    # -- Specifies whether a service account should be created
    create: true
    # -- Annotations to add to the service account
    annotations: {}
    # -- The name of the service account to use. If not set and create is true, a name is generated using the fullname template
    name: ""
    # -- Automount API credentials for a service account
    automountServiceAccountToken: false

  # -- Annotations to add to llm-bridge pods
  podAnnotations: {}

  # -- LLM Bridge pod security context. Runs as non-root user (node:1000)
  podSecurityContext:
    runAsUser: 1000
    runAsGroup: 1000
    fsGroup: 1000
    fsGroupChangePolicy: OnRootMismatch
    supplementalGroups: [1000]
    seccompProfile:
      type: RuntimeDefault

  # -- LLM Bridge container security context. Hardened with read-only root filesystem
  securityContext:
    privileged: false
    capabilities:
      drop:
      - ALL
    readOnlyRootFilesystem: true
    runAsNonRoot: true
    runAsUser: 1000
    allowPrivilegeEscalation: false

  service:
    # -- LLM Bridge service name
    name: "kguardian-llm-bridge"
    # -- LLM Bridge service type
    type: ClusterIP
    # -- LLM Bridge service port
    port: 8080

  # -- LLM Bridge pod resource requests and limits
  resources:
    limits:
      # cpu: 500m
      memory: 512Mi
    requests:
      cpu: 100m
      memory: 256Mi

  autoscaling:
    # -- Enable horizontal pod autoscaling for llm-bridge
    enabled: false
    # -- Minimum number of llm-bridge replicas
    minReplicas: 2
    # -- Maximum number of llm-bridge replicas
    maxReplicas: 10
    # -- Target CPU utilization percentage for autoscaling
    targetCPUUtilizationPercentage: 80
    # targetMemoryUtilizationPercentage: 80

  # -- Node labels for the kguardian llm-bridge pod assignment
  nodeSelector:
    kubernetes.io/os: linux

  # -- Tolerations for the kguardian llm-bridge pod assignment
  tolerations: []

  # -- Affinity rules for llm-bridge pod assignment
  affinity: {}

  # -- Priority class to be used for the kguardian llm-bridge pods
  priorityClassName: ""

  # -- Startup probe. Empty by default — opt in when slow startup is expected.
  startupProbe: {}

  # -- Topology spread constraints applied to llm-bridge pods.
  topologySpreadConstraints: []

  podDisruptionBudget:
    # -- Create a PodDisruptionBudget for the llm-bridge. Defaults to false;
    # enable when running >1 replica.
    enabled: false
    minAvailable: 1
    maxUnavailable: ""

  metrics:
    serviceMonitor:
      # -- Create a ServiceMonitor for prometheus-operator. llm-bridge does
      # not currently expose /metrics — forward-compatible toggle.
      enabled: false
      path: /metrics
      port: http
      interval: 30s
      scrapeTimeout: 10s
      labels: {}

  # -- Additional environment variables for llm-bridge
  env: []

  # LLM Provider secrets configuration
  # Each provider uses its own secret with a normalized key name 'api-key'
  secrets:
    # -- Normalized secret key name used for all providers
    keyName: "api-key"

    # OpenAI configuration
    openai:
      # -- Enable OpenAI provider
      enabled: false
      # -- Secret name for OpenAI
      name: "kguardian-openai"

    # Anthropic configuration
    anthropic:
      # -- Enable Anthropic Claude provider
      enabled: false
      # -- Secret name for Anthropic
      name: "kguardian-anthropic"

    # Google Gemini configuration
    gemini:
      # -- Enable Google Gemini provider
      enabled: false
      # -- Secret name for Gemini
      name: "kguardian-gemini"

    # GitHub Copilot configuration
    copilot:
      # -- Enable GitHub Copilot provider
      enabled: false
      # -- Secret name for GitHub Copilot
      name: "kguardian-copilot"

# MCP Server Configuration (Model Context Protocol)
# The MCP server provides external tools (like Claude Desktop) access to cluster data
mcpServer:
  # -- Enable MCP Server for external integrations
  enabled: false

  # -- Number of mcp-server replicas to deploy (ignored if useKmcp is true and autoscaling is enabled)
  replicaCount: 1
  image:
    # -- MCP Server container image repository
    repository: ghcr.io/kguardian-dev/kguardian/mcp-server
    # -- MCP Server image pull policy
    pullPolicy: IfNotPresent
    # -- MCP Server version tag (auto-updated by release-please)
    tag: "1.3.4"
    # -- Overrides the image tag using SHA digest
    sha: ""

  container:
    # -- MCP Server container HTTP port for StreamableHTTP transport
    port: 8081

  # -- List of image pull secrets for private registries
  imagePullSecrets: []
  # -- Override the name of the mcp-server resources
  nameOverride: ""
  # -- Override the full name of the mcp-server resources
  fullnameOverride: ""

  serviceAccount:
    # -- Specifies whether a service account should be created
    create: true
    # -- Annotations to add to the service account
    annotations: {}
    # -- The name of the service account to use. If not set and create is true, a name is generated using the fullname template
    name: ""
    # -- Automount API credentials for a service account
    automountServiceAccountToken: false

  # -- Annotations to add to mcp-server pods
  podAnnotations: {}

  # -- MCP Server pod security context. Runs as non-root user (mcp:1000)
  podSecurityContext:
    runAsUser: 1000
    runAsGroup: 1000
    fsGroup: 1000
    fsGroupChangePolicy: OnRootMismatch
    supplementalGroups: [1000]
    seccompProfile:
      type: RuntimeDefault

  # -- MCP Server container security context. Hardened with read-only root filesystem
  securityContext:
    privileged: false
    capabilities:
      drop:
      - ALL
    readOnlyRootFilesystem: true
    runAsNonRoot: true
    runAsUser: 1000
    allowPrivilegeEscalation: false

  service:
    # -- MCP Server service name
    name: "kguardian-mcp-server"
    # -- MCP Server service type
    type: ClusterIP
    # -- MCP Server service port
    port: 8081

  # -- MCP Server pod resource requests and limits
  resources:
    limits:
      # cpu: 200m
      memory: 256Mi
    requests:
      cpu: 50m
      memory: 128Mi

  autoscaling:
    # -- Enable horizontal pod autoscaling for mcp-server
    enabled: false
    # -- Minimum number of mcp-server replicas
    minReplicas: 1
    # -- Maximum number of mcp-server replicas
    maxReplicas: 5
    # -- Target CPU utilization percentage for autoscaling
    targetCPUUtilizationPercentage: 80
    # targetMemoryUtilizationPercentage: 80

  # -- Node labels for the kguardian mcp-server pod assignment
  nodeSelector:
    kubernetes.io/os: linux

  # -- Tolerations for the kguardian mcp-server pod assignment
  tolerations: []

  # -- Affinity rules for mcp-server pod assignment
  affinity: {}

  # -- Additional environment variables for mcp-server
  env: []
  # Example:
  # - name: LOG_LEVEL
  #   value: debug

  # -- Priority class to be used for the kguardian mcp-server pods
  priorityClassName: ""

  # -- Startup probe. Empty by default — opt in when slow startup is expected.
  startupProbe: {}

  # -- Topology spread constraints applied to mcp-server pods.
  topologySpreadConstraints: []

  podDisruptionBudget:
    # -- Create a PodDisruptionBudget for the mcp-server. Defaults to false;
    # enable when running >1 replica.
    enabled: false
    minAvailable: 1
    maxUnavailable: ""

  metrics:
    serviceMonitor:
      # -- Create a ServiceMonitor for prometheus-operator. mcp-server has a
      # /metrics endpoint configured via kmcp.yaml; toggle this on once the
      # exposed port matches `service.port`.
      enabled: false
      path: /metrics
      port: http
      interval: 30s
      scrapeTimeout: 10s
      labels: {}

# -------------------------------------------------------------------------
# kguardian-evaluator: watches AuditNetworkPolicy CRDs and reports flows
# that *would* be denied. No traffic is ever blocked. See
# docs/audit-network-policy.mdx for the design.
# -------------------------------------------------------------------------
evaluator:
  # -- Deploy the audit-mode policy evaluator. When false, the evaluator
  # workload, RBAC, Service, and PDB/ServiceMonitor are skipped. The CRD
  # itself ships in charts/kguardian/crds/ and is always installed by
  # Helm regardless of this toggle.
  #
  # The evaluator is now published at ghcr.io/kguardian-dev/kguardian/evaluator
  # and on by default. Set to false to skip the workload while still
  # installing the AuditNetworkPolicy CRD (e.g. for shared-cluster setups
  # where the evaluator runs elsewhere).
  enabled: true

  # -- Number of evaluator replicas
  replicaCount: 1

  image:
    # -- Evaluator container image repository
    repository: ghcr.io/kguardian-dev/kguardian/evaluator
    # -- Evaluator image pull policy
    pullPolicy: IfNotPresent
    # -- Evaluator version tag (auto-updated by release-please)
    tag: "v0.2.0"
    # -- Overrides the image tag using SHA digest
    sha: ""

  # -- Log level for the evaluator process (panic|fatal|error|warn|info|debug|trace)
  logLevel: info

  # -- Additional environment variables for the evaluator
  env: []

  container:
    # -- Evaluator HTTP port
    port: 8082

  service:
    # -- Evaluator service name
    name: "kguardian-evaluator"
    # -- Evaluator service type
    type: ClusterIP
    # -- Evaluator service port
    port: 8082

  # -- List of image pull secrets for private registries
  imagePullSecrets: []

  serviceAccount:
    # -- Specifies whether a service account should be created
    create: true
    # -- Annotations to add to the service account
    annotations: {}
    # -- The name of the service account to use
    name: ""
    # -- Automount API credentials (the evaluator must reach the API server
    # to watch CRDs, pods, and namespaces)
    automountServiceAccountToken: true

  # -- Annotations to add to evaluator pods
  podAnnotations: {}

  # -- Evaluator pod security context. Runs as non-root user (1000)
  podSecurityContext:
    runAsUser: 1000
    runAsGroup: 1000
    fsGroup: 1000
    fsGroupChangePolicy: OnRootMismatch
    supplementalGroups: [1000]
    seccompProfile:
      type: RuntimeDefault

  # -- Evaluator container security context. Hardened with read-only root filesystem
  securityContext:
    privileged: false
    capabilities:
      drop:
      - ALL
    readOnlyRootFilesystem: true
    runAsNonRoot: true
    runAsUser: 1000
    allowPrivilegeEscalation: false

  # -- Evaluator pod resource requests and limits
  resources:
    limits:
      memory: 256Mi
    requests:
      cpu: 50m
      memory: 64Mi

  autoscaling:
    # -- Enable horizontal pod autoscaling for evaluator
    enabled: false
    # -- Minimum number of evaluator replicas
    minReplicas: 1
    # -- Maximum number of evaluator replicas
    maxReplicas: 5
    # -- Target CPU utilization percentage for autoscaling
    targetCPUUtilizationPercentage: 80

  # -- Node labels for evaluator pod assignment
  nodeSelector:
    kubernetes.io/os: linux

  # -- Tolerations for evaluator pod assignment
  tolerations: []

  # -- Affinity rules for evaluator pod assignment
  affinity: {}

  # -- Priority class to be used for the kguardian evaluator pods
  priorityClassName: ""

  # -- Startup probe. Empty by default — opt in when slow startup is expected.
  startupProbe: {}

  # -- Topology spread constraints applied to evaluator pods.
  topologySpreadConstraints: []

  podDisruptionBudget:
    # -- Create a PodDisruptionBudget for the evaluator. Defaults to false;
    # enable when running >1 replica.
    enabled: false
    minAvailable: 1
    maxUnavailable: ""

  metrics:
    serviceMonitor:
      # -- Create a ServiceMonitor for prometheus-operator. The evaluator
      # does not currently expose /metrics natively — forward-compatible
      # toggle for when it does.
      enabled: false
      path: /metrics
      port: http
      interval: 30s
      scrapeTimeout: 10s
      labels: {}
