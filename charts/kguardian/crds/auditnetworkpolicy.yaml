apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: auditnetworkpolicies.kguardian.dev
  labels:
    app.kubernetes.io/name: kguardian
    app.kubernetes.io/component: evaluator
spec:
  group: kguardian.dev
  scope: Namespaced
  names:
    kind: AuditNetworkPolicy
    listKind: AuditNetworkPolicyList
    plural: auditnetworkpolicies
    singular: auditnetworkpolicy
    shortNames:
      - anp
    categories:
      - kguardian
      - networking
  versions:
    - name: v1alpha1
      served: true
      storage: true
      subresources:
        status: {}
      additionalPrinterColumns:
        - name: Pod-Selector
          type: string
          description: Pods this policy targets
          jsonPath: .spec.podSelector
        - name: Would-Deny
          type: integer
          description: Flows that would have been denied (rolling window)
          jsonPath: .status.evaluation.flowsWouldDeny
        - name: Last-Evaluated
          type: date
          jsonPath: .status.evaluation.lastEvaluated
        - name: Age
          type: date
          jsonPath: .metadata.creationTimestamp
      schema:
        openAPIV3Schema:
          description: |
            AuditNetworkPolicy mirrors networking.k8s.io/v1.NetworkPolicy 1:1
            in spec shape. The kguardian-evaluator watches observed pod
            traffic and reports flows that *would* be denied by this policy
            without actually dropping anything. Promote to enforced policy
            by re-applying the same spec under kind: NetworkPolicy.
          type: object
          required: [spec]
          properties:
            apiVersion: { type: string }
            kind: { type: string }
            metadata: { type: object }
            spec:
              description: |
                NetworkPolicySpec — identical to networking.k8s.io/v1
                NetworkPolicy. See
                https://kubernetes.io/docs/reference/generated/kubernetes-api/v1.32/#networkpolicyspec-v1-networking-k8s-io
              type: object
              required: [podSelector]
              properties:
                podSelector:
                  type: object
                  x-kubernetes-preserve-unknown-fields: true
                policyTypes:
                  type: array
                  # Only two valid values exist; constraining the array
                  # at admission stops accidental duplicates from being
                  # accepted (and double-counted by the evaluator).
                  maxItems: 2
                  x-kubernetes-list-type: set
                  items:
                    type: string
                    enum: [Ingress, Egress]
                ingress:
                  type: array
                  items:
                    type: object
                    x-kubernetes-preserve-unknown-fields: true
                egress:
                  type: array
                  items:
                    type: object
                    x-kubernetes-preserve-unknown-fields: true
            status:
              type: object
              properties:
                observedGeneration:
                  type: integer
                  format: int64
                evaluation:
                  type: object
                  properties:
                    lastEvaluated:
                      type: string
                      format: date-time
                    flowsEvaluated:
                      type: integer
                      format: int64
                    flowsWouldDeny:
                      type: integer
                      format: int64
                    topOffenders:
                      type: array
                      maxItems: 50
                      items:
                        type: object
                        properties:
                          srcPod: { type: string }
                          dstPod: { type: string }
                          dstPort: { type: integer, format: int32 }
                          protocol: { type: string }
                          direction: { type: string }
                          count: { type: integer, format: int64 }
