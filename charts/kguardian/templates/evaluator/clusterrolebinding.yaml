{{- if .Values.evaluator.enabled }}
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ .Release.Name }}-{{ include "kguardian.name" . }}-evaluator
  labels:
    {{- include "kguardian.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "kguardian.name" . }}-evaluator
subjects:
  - kind: ServiceAccount
    name: {{ default "evaluator" .Values.evaluator.serviceAccount.name }}
    namespace: {{ include "kguardian.namespace" . | trim }}
{{- end }}
