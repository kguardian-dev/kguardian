{{- if .Values.evaluator.enabled }}
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "kguardian.name" . }}-evaluator
  labels:
    {{- include "kguardian.labels" . | nindent 4 }}
rules:
  # Read pod + namespace state for selector evaluation.
  - apiGroups: [""]
    resources: [pods, namespaces]
    verbs: [get, list, watch]
  # Watch the AuditNetworkPolicy CRD via the dynamic client.
  - apiGroups: [kguardian.dev]
    resources: [auditnetworkpolicies]
    verbs: [get, list, watch]
  # Allow the evaluator to write back rolling-window evaluation summary
  # via the status subresource. Spec edits are not granted.
  - apiGroups: [kguardian.dev]
    resources: [auditnetworkpolicies/status]
    verbs: [get, update, patch]
  # Emit Kubernetes Events on the AuditNetworkPolicy when a flow would
  # be denied (post-MVP — RBAC pre-granted so it's ready when the
  # event-emission code lands).
  - apiGroups: [""]
    resources: [events]
    verbs: [create, patch]
{{- end }}
