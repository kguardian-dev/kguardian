{{- if .Values.evaluator.enabled }}
{{- /*
  Multi-replica guardrail. The evaluator's status aggregator keeps
  per-policy counters in process memory and writes back to the CRD's
  status subresource on its own schedule. With multiple replicas:
    - the broker round-robins /evaluate calls so each replica sees
      a partial view of flows; flowsEvaluated/flowsWouldDeny are
      reported per-replica with last-writer-wins on the patch;
    - status updates race; topOffenders flips between disjoint sets
      every reconcile.
  Until proper leader election lands, refuse to render >1 replica.
  Operators that genuinely need HA can run a second kguardian
  instance with its own broker/db pair.
*/ -}}
{{- if and (not .Values.evaluator.autoscaling.enabled) (gt (int .Values.evaluator.replicaCount) 1) }}
{{- fail "evaluator.replicaCount > 1 is not supported: replicas race on AuditNetworkPolicy.status writes and produce contradictory counters. Set evaluator.replicaCount=1." }}
{{- end }}
{{- if .Values.evaluator.autoscaling.enabled }}
{{- fail "evaluator.autoscaling.enabled=true is not supported: replicas race on AuditNetworkPolicy.status writes. Disable autoscaling for the evaluator." }}
{{- end }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Values.evaluator.service.name }}
  labels:
    {{- include "kguardian.labels" . | nindent 4 }}
spec:
  {{- if not .Values.evaluator.autoscaling.enabled }}
  replicas: {{ .Values.evaluator.replicaCount }}
  {{- end }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ .Values.evaluator.service.name }}
  template:
    metadata:
      {{- with .Values.evaluator.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      labels:
        {{- include "kguardian.labels" . | nindent 8 }}
        app.kubernetes.io/name: {{ .Values.evaluator.service.name }}
    spec:
      automountServiceAccountToken: true
      {{- with .Values.evaluator.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ default "evaluator" .Values.evaluator.serviceAccount.name }}
      securityContext:
        {{- toYaml .Values.evaluator.podSecurityContext | nindent 8 }}
      containers:
        - name: evaluator
          securityContext:
            {{- toYaml .Values.evaluator.securityContext | nindent 12 }}
          {{- if .Values.evaluator.image.sha }}
          image: "{{ .Values.evaluator.image.repository }}@{{ .Values.evaluator.image.sha }}"
          {{- else }}
          image: "{{ .Values.evaluator.image.repository }}:{{ include "kguardian.imageTag" .Values.evaluator.image.tag }}"
          {{- end }}
          imagePullPolicy: {{ .Values.evaluator.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.evaluator.container.port }}
              protocol: TCP
          env:
            - name: LISTEN_ADDR
              value: ":{{ .Values.evaluator.container.port }}"
            - name: LOG_LEVEL
              value: {{ .Values.evaluator.logLevel | quote }}
            {{- with .Values.evaluator.env }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          {{- with .Values.evaluator.startupProbe }}
          startupProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
          {{- with .Values.evaluator.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
      {{- with .Values.evaluator.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.evaluator.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.evaluator.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.evaluator.topologySpreadConstraints }}
      topologySpreadConstraints:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}
