{{- if and .Values.evaluator.enabled .Values.evaluator.serviceAccount.create -}}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ default "evaluator" .Values.evaluator.serviceAccount.name }}
  labels:
    {{- include "kguardian.labels" . | nindent 4 }}
  {{- with .Values.evaluator.serviceAccount.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
automountServiceAccountToken: {{ .Values.evaluator.serviceAccount.automountServiceAccountToken }}
{{- end }}
