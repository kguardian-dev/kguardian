{{- if .Values.database.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Values.database.name }}
spec:
  replicas: 1
  # Recreate (not RollingUpdate) because the database owns a singleton
  # ReadWriteOnce PVC. A rolling update would try to schedule the new
  # pod while the old pod still holds the volume; the new pod would
  # block in ContainerCreating waiting for an attach that can't happen
  # under RWO, helm --wait would time out, the upgrade would fail.
  # Recreate kills the old pod first, frees the PVC, then starts the
  # new one. There's a brief downtime window but no upgrade deadlock.
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ .Values.database.service.name }}
  template:
    metadata:
      {{- with .Values.database.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      labels:
        {{- include "kguardian.labels" . | nindent 8 }}
        app.kubernetes.io/name: {{ .Values.database.service.name }}
    spec:
      serviceAccountName: {{ default "database" .Values.database.serviceAccount.name }}
      automountServiceAccountToken: false
      securityContext:
        {{- toYaml .Values.database.podSecurityContext | nindent 8 }}
      {{- if and .Values.database.persistence.enabled .Values.database.persistence.safeBoot }}
      initContainers:
        # Cross-major datadir guard. The chart's mountPath is
        # /var/lib/postgresql so any PG-major-specific subdirectory
        # (15/, 16/, 17/, 18/...) lives directly under the PVC root.
        # If the PVC has data for a DIFFERENT major than the running
        # image and the current major's PGDATA is empty, the postgres
        # entrypoint would happily initdb a fresh database — silently
        # leaving operators on an empty cluster while the prior data
        # sits unused on the volume. Refuse to boot in that case.
        #
        # Disable via database.persistence.safeBoot=false when
        # intentionally rolling forward after an offline pg_upgrade.
        - name: assert-safe-boot
          image: "{{ .Values.database.image.repository }}:{{ .Values.database.image.tag }}"
          imagePullPolicy: {{ .Values.database.image.pullPolicy }}
          # Hardened context — the init container only reads filesystem
          # metadata (PG_VERSION existence checks); no need for the full
          # postgres container's writable rootfs / UID 999.
          securityContext:
            runAsNonRoot: true
            runAsUser: 65534
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            seccompProfile:
              type: RuntimeDefault
          # Resource ceiling kept tight: this container is a sub-second
          # filesystem inspection, then it exits.
          resources:
            requests:
              cpu: 10m
              memory: 16Mi
            limits:
              cpu: 100m
              memory: 64Mi
          command:
            - /bin/sh
            - -c
            - |
              set -eu
              vol="/var/lib/postgresql"
              # PG_MAJOR is set in every official postgres image; fail loudly
              # if it isn't (image swapped to one that doesn't expose it).
              if [ -z "${PG_MAJOR:-}" ]; then
                echo "FATAL: PG_MAJOR not set in postgres image; cannot determine target datadir" >&2
                exit 1
              fi
              current="${vol}/${PG_MAJOR}/docker"
              if [ -f "${current}/PG_VERSION" ]; then
                echo "datadir present at ${current} (PG_VERSION exists); ok"
                exit 0
              fi
              # Current major has no datadir. Look for OTHER PG datadirs on
              # the volume — the cross-major case the postgres entrypoint
              # silently overwrites.
              other=""
              for d in "${vol}"/*/; do
                [ -d "${d}" ] || continue
                base="$(basename "${d}")"
                # PG_MAJOR may match a literal subdir; skip it.
                [ "${base}" = "${PG_MAJOR}" ] && continue
                if [ -f "${d}/docker/PG_VERSION" ] || [ -f "${d}/data/PG_VERSION" ]; then
                  other="${d}"
                  break
                fi
              done
              if [ -n "${other}" ]; then
                echo "FATAL: PVC contains an existing PostgreSQL datadir at ${other} but"  >&2
                echo "the current major (${PG_MAJOR}) has no datadir at ${current}."        >&2
                echo "Booting now would silently initdb over an empty location and"        >&2
                echo "leave the prior data unused. Refusing."                                >&2
                echo                                                                          >&2
                echo "If this is an intentional cross-major roll-forward, run pg_upgrade"   >&2
                echo "offline OR set database.persistence.safeBoot=false to bypass."        >&2
                exit 1
              fi
              echo "no prior PG datadir on ${vol}; fresh install — ok"
          volumeMounts:
            - mountPath: /var/lib/postgresql
              name: db-data
      {{- end }}
      containers:
        - name: postgresdb
          {{- if .Values.database.image.sha }}
          image: "{{ .Values.database.image.repository }}@{{ .Values.database.image.sha }}"
          {{- else }}
          image: "{{ .Values.database.image.repository }}:{{ .Values.database.image.tag }}"
          {{- end }}
          imagePullPolicy: {{ .Values.database.image.pullPolicy }}
          ports:
            - containerPort: 5432
          securityContext:
            {{- toYaml .Values.database.securityContext | nindent 12 }}
          env:
            - name: POSTGRES_USER
              value: {{ .Values.database.user | quote }}
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "kguardian.dbSecretName" . }}
                  key: {{ .Values.database.passwordSecretKey }}
            - name: POSTGRES_DB
              value: {{ .Values.database.databaseName | quote }}
          livenessProbe:
            exec:
              command:
                - pg_isready
                - -U
                - {{ .Values.database.user | quote }}
                - -d
                - {{ .Values.database.databaseName | quote }}
            initialDelaySeconds: 30
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            exec:
              command:
                - pg_isready
                - -U
                - {{ .Values.database.user | quote }}
                - -d
                - {{ .Values.database.databaseName | quote }}
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          {{- with .Values.database.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          volumeMounts:
            # postgres:18+ images use major-version-specific subdirectories
            # under /var/lib/postgresql (e.g. /var/lib/postgresql/18/docker/),
            # so the PVC must mount the parent directory. See
            # https://github.com/docker-library/postgres/pull/1259
            - mountPath: /var/lib/postgresql
              name: db-data
      volumes:
        - name: db-data
          {{- if .Values.database.persistence.enabled }}
          persistentVolumeClaim:
            claimName: {{ .Values.database.persistence.existingClaim | default (printf "%s-data" .Values.database.name) }}
          {{- else }}
          emptyDir: {}
          {{- end -}}
      {{- with .Values.database.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.database.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.database.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}
