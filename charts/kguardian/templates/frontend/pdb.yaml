{{- if .Values.frontend.podDisruptionBudget.enabled }}
{{- /* PDB-singleton guardrail. See evaluator/pdb.yaml (b964c58d). */ -}}
{{- $pdb := .Values.frontend.podDisruptionBudget -}}
{{- $replicas := int .Values.frontend.replicaCount -}}
{{- if and (not $pdb.maxUnavailable) (le $replicas 1) }}
{{- fail "frontend.podDisruptionBudget.enabled with replicaCount=1 and minAvailable>=1 blocks ALL voluntary evictions (kubectl drain stalls forever). Either bump frontend.replicaCount > 1, set podDisruptionBudget.maxUnavailable=1, or disable the PDB." }}
{{- end }}
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: {{ include "kguardian.name" . }}-frontend
  labels:
    {{- include "kguardian.labels" . | nindent 4 }}
spec:
  {{- if $pdb.maxUnavailable }}
  maxUnavailable: {{ $pdb.maxUnavailable }}
  {{- else }}
  minAvailable: {{ $pdb.minAvailable | default 1 }}
  {{- end }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ .Values.frontend.service.name }}
{{- end }}
