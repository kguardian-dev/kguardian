---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "kguardian.name" . }}-broker
  labels:
    {{- include "kguardian.labels" . | nindent 4 }}
spec:
  {{- if not .Values.broker.autoscaling.enabled }}
  replicas: {{ .Values.broker.replicaCount }}
  {{- end }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ .Values.broker.service.name }}
  template:
    metadata:
      {{- with .Values.broker.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      labels:
        {{- include "kguardian.labels" . | nindent 8 }}
        app.kubernetes.io/name: {{ .Values.broker.service.name }}
    spec:
      automountServiceAccountToken: false
      {{- with .Values.broker.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ default "broker" .Values.broker.serviceAccount.name }}
      securityContext:
        {{- toYaml .Values.broker.podSecurityContext | nindent 8 }}
      initContainers:
        - name: wait-for-db
          {{- if .Values.broker.initContainer.image.sha }}
          image: "{{ .Values.broker.initContainer.image.repository }}@{{ .Values.broker.initContainer.image.sha }}"
          {{- else }}
          image: "{{ .Values.broker.initContainer.image.repository }}:{{ .Values.broker.initContainer.image.tag }}"
          {{- end }}
          imagePullPolicy: {{ .Values.broker.initContainer.image.pullPolicy }}
          command: ["sh", "-c", "until nc -z {{ .Values.database.service.name }}.{{ include "kguardian.namespace" . }}.svc.cluster.local {{ .Values.database.container.port }}; do echo 'waiting for db'; sleep 2; done"]
          securityContext:
            {{- toYaml .Values.broker.initContainer.securityContext | nindent 12 }}
      containers:
        - name: broker
          securityContext:
            {{- toYaml .Values.broker.securityContext | nindent 12 }}
          {{- if .Values.broker.image.sha }}
          image: "{{ .Values.broker.image.repository }}@{{ .Values.broker.image.sha }}"
          {{- else }}
          image: "{{ .Values.broker.image.repository }}:{{ .Values.broker.image.tag }}"
          {{- end }}
          imagePullPolicy: {{ .Values.broker.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.broker.container.port }}
              protocol: TCP
          env:
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: kguardian-db-credentials
                  key: password
            - name: DATABASE_URL
              value: "postgres://rust:$(DB_PASSWORD)@{{ .Values.database.service.name }}.{{ include "kguardian.namespace" . }}.svc.cluster.local:{{ .Values.database.container.port }}/kube"
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
         {{- with .Values.broker.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
      {{- with .Values.broker.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.broker.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.broker.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
