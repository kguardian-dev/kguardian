---
# yaml-language-server: $schema=https://taskfile.dev/schema.json
version: '3'

vars:
  UI_IMAGE_NAME: ghcr.io/kguardian-dev/kguardian/frontend
  IMAGE_VERSION: local

tasks:
  all:
    desc: "Run all UI tasks"
    cmds:
      - task: build
      - task: docker

  install:
    desc: "Install UI dependencies"
    dir: frontend
    cmds:
      - npm install

  dev:
    desc: "Start UI development server"
    dir: frontend
    cmds:
      - npm run dev

  build:
    desc: "Build and package the UI"
    dir: frontend
    deps: [install]
    cmds:
      - npm run build

  docker:
    desc: "Build UI Docker image and load into Kind"
    deps: [build]
    cmds:
      - docker build -t {{.UI_IMAGE_NAME}}:{{.IMAGE_VERSION}} frontend
      - kind load docker-image {{.UI_IMAGE_NAME}}:{{.IMAGE_VERSION}}

  lint:
    desc: "Lint UI code"
    dir: frontend
    cmds:
      - npm run lint

  preflight:
    desc: "Run preflight checks for UI"
    cmds:
      - command -v node || echo "Node.js is not installed"
      - command -v npm || echo "npm is not installed"
