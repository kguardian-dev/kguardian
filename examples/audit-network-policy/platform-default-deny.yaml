# Cluster-scoped AuditClusterNetworkPolicy.
# Default-denies ingress for every pod in any namespace labelled
# team=platform. The kguardian-evaluator will report flows that would
# be denied — without dropping any traffic.
#
# Promotion path:
#   kguardian audit promote-cluster platform-default-deny-ingress \
#     | kubectl apply -f -
#
# This emits one networking.k8s.io/v1.NetworkPolicy per namespace
# matched by spec.namespaceSelector. (If your CNI supports cluster-wide
# enforcement — Calico GlobalNetworkPolicy, upstream AdminNetworkPolicy
# — you can instead translate the spec to those by hand.)
apiVersion: kguardian.dev/v1alpha1
kind: AuditClusterNetworkPolicy
metadata:
  name: platform-default-deny-ingress
spec:
  namespaceSelector:
    matchLabels:
      team: platform
  podSelector: {}
  policyTypes: [Ingress]
  # Empty ingress rules → default-deny ingress in every matched namespace.
