---
# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
name: Build and Push Evaluator Docker Images

on:
  workflow_dispatch:
  push:
    tags:
      - "evaluator/v*"

jobs:
  build_and_push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Cache Go modules
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6
        with:
          path: |
            ~/.cache/go-build
            ~/go/pkg/mod
          key: ${{ runner.os }}-go-evaluator-${{ hashFiles('evaluator/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-evaluator-
            ${{ runner.os }}-go-

      - name: Set up QEMU
        uses: docker/setup-qemu-action@06116385d9baf250c9f4dcb4858b16962ea869c3 # v4
        with:
          platforms: all

      - name: Set up Docker Buildx
        id: buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4
        with:
          install: true
          version: latest

      - name: Login to GHCR
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract tag name
        id: extract_tag
        env:
          GITHUB_REF_NAME_ENV: ${{ github.ref_name }}
        run: |
          # Tag format is "evaluator/vX.Y.Z" — strip the "evaluator/" prefix.
          # Validate the result so a malformed tag fails loudly instead of
          # being interpolated into the docker tag below.
          VERSION="${GITHUB_REF_NAME_ENV#evaluator/}"
          if ! [[ "$VERSION" =~ ^v[0-9]+\.[0-9]+\.[0-9]+([.-][A-Za-z0-9.-]+)?$ ]]; then
            echo "::error::Refusing to build for malformed tag: $GITHUB_REF_NAME_ENV"
            exit 1
          fi
          echo "TAG_NAME=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Build and Push
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7
        with:
          context: evaluator/
          file: evaluator/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/kguardian-dev/kguardian/evaluator:${{ steps.extract_tag.outputs.TAG_NAME }}
            ghcr.io/kguardian-dev/kguardian/evaluator:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
