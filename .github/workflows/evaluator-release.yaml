---
# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
name: Build and Push Evaluator Docker Images

on:
  workflow_dispatch:
  push:
    tags:
      - "evaluator/v*"

jobs:
  build_and_push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Cache Go modules
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          path: |
            ~/.cache/go-build
            ~/go/pkg/mod
          key: ${{ runner.os }}-go-evaluator-${{ hashFiles('evaluator/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-evaluator-
            ${{ runner.os }}-go-

      - name: Set up QEMU
        uses: docker/setup-qemu-action@06116385d9baf250c9f4dcb4858b16962ea869c3 # v4
        with:
          platforms: all

      - name: Set up Docker Buildx
        id: buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4
        with:
          install: true
          version: latest

      - name: Login to GHCR
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract tag name
        id: extract_tag
        env:
          GITHUB_REF_NAME_ENV: ${{ github.ref_name }}
        run: |
          # Tag format is "evaluator/vX.Y.Z" — strip the "evaluator/" prefix.
          # Validate the result so a malformed tag fails loudly instead of
          # being interpolated into the docker tag below.
          VERSION="${GITHUB_REF_NAME_ENV#evaluator/}"
          if ! [[ "$VERSION" =~ ^v[0-9]+\.[0-9]+\.[0-9]+([.-][A-Za-z0-9.-]+)?$ ]]; then
            echo "::error::Refusing to build for malformed tag: $GITHUB_REF_NAME_ENV"
            exit 1
          fi
          echo "TAG_NAME=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Build and Push
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7
        with:
          context: evaluator/
          file: evaluator/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/kguardian-dev/kguardian/evaluator:${{ steps.extract_tag.outputs.TAG_NAME }}
            ghcr.io/kguardian-dev/kguardian/evaluator:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
