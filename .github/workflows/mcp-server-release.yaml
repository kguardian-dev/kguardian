---
# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
name: Build and Push MCP Server Docker Images

on:
  workflow_dispatch:
  push:
    tags:
      - "mcp-server/v*"

jobs:
  build_and_push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7

      - name: Cache Go modules
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6
        with:
          path: |
            ~/.cache/go-build
            ~/go/pkg/mod
          key: ${{ runner.os }}-go-mcp-server-${{ hashFiles('mcp-server/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-mcp-server-
            ${{ runner.os }}-go-

      - name: Set up QEMU
        uses: docker/setup-qemu-action@96fe6ef7f33517b61c61be40b68a1882f3264fb8 # v4
        with:
          platforms: all

      - name: Set up Docker Buildx
        id: buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4
        with:
          install: true
          version: latest

      - name: Login to GHCR
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract tag name
        id: extract_tag
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          VERSION="${TAG#mcp-server/}"
          echo "TAG_NAME=${VERSION}" >> $GITHUB_OUTPUT

      - name: Build and Push
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7
        with:
          context: mcp-server/
          file: mcp-server/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/kguardian-dev/kguardian/mcp-server:${{ steps.extract_tag.outputs.TAG_NAME }}
            ghcr.io/kguardian-dev/kguardian/mcp-server:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
