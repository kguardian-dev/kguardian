---
# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
name: Build PR Docker Images

on:
  pull_request:
    branches:
      - main
    paths:
      - 'controller/**'
      - 'broker/**'
      - 'frontend/**'
      - 'llm-bridge/**'
      - 'mcp-server/**'
      - 'charts/**'
      - '.github/workflows/pr-build.yaml'

permissions:
  contents: read
  packages: write
  pull-requests: write

jobs:
  # Detect which components changed
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      controller: ${{ steps.changes.outputs.controller }}
      broker: ${{ steps.changes.outputs.broker }}
      frontend: ${{ steps.changes.outputs.frontend }}
      llm-bridge: ${{ steps.changes.outputs.llm-bridge }}
      mcp-server: ${{ steps.changes.outputs.mcp-server }}
      charts: ${{ steps.changes.outputs.charts }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 2  # Fetch enough history to compare with previous commit

      - uses: dorny/paths-filter@9d7afb8d214ad99e78fbd4247752c4caed2b6e4c # v4
        id: changes
        with:
          # Compare HEAD with previous commit (HEAD~1) to only detect changes in latest push
          base: HEAD~1
          filters: |
            controller:
              - 'controller/**'
            broker:
              - 'broker/**'
            frontend:
              - 'frontend/**'
            llm-bridge:
              - 'llm-bridge/**'
            mcp-server:
              - 'mcp-server/**'
            charts:
              - 'charts/**'

  # Build Controller
  build-controller:
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.controller == 'true'
    strategy:
      matrix:
        arch:
          - linux/amd64
          - linux/arm64
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Install Rust nightly
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: nightly
          targets: x86_64-unknown-linux-musl
          components: rustfmt, clippy, miri, rust-src

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: stable
          targets: x86_64-unknown-linux-musl
          components: rustfmt, clippy

      - name: Cache Rust dependencies
        uses: actions/cache@cdf6c1fa76f9f475f3d7449005a359c84ca0f306 # v5
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            controller/target/
          key: ${{ runner.os }}-cargo-${{ matrix.arch }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-${{ matrix.arch }}-
            ${{ runner.os }}-cargo-

      - name: Set Build Arguments
        id: args
        run: |
          if [ "${{ matrix.arch }}" == "linux/arm64" ]; then
            echo "BUILD=aarch64-unknown-linux-gnu" >> $GITHUB_OUTPUT
          else
            echo "BUILD=x86_64-unknown-linux-gnu" >> $GITHUB_OUTPUT
          fi

      - name: Build Rust
        run: |
          sudo apt update -y
          sudo apt install linux-tools-common linux-tools-generic linux-tools-$(uname -r) -y
          cd controller
          cargo install cross --git https://github.com/cross-rs/cross --force
          cross build --target ${{ steps.args.outputs.BUILD }} --release

      - uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
        with:
          name: ${{ steps.args.outputs.BUILD }}-binary
          path: controller/target/${{ steps.args.outputs.BUILD }}/release/kguardian
          retention-days: 7

  push-controller:
    runs-on: ubuntu-latest
    needs: build-controller
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up QEMU
        uses: docker/setup-qemu-action@ce360397dd3f832beb865e1373c09c0e9f86d70a # v4
        with:
          platforms: all

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4
        with:
          install: true
          version: latest

      - name: Login to GHCR
        uses: docker/login-action@b45d80f862d83dbcd57f89517bcf500b2ab88fb2 # v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/download-artifact@70fc10c6e5e1ce46ad2ea6f2b72d43f7d47b13c3 # v8
        with:
          name: x86_64-unknown-linux-gnu-binary
          path: controller/linux/amd64

      - uses: actions/download-artifact@70fc10c6e5e1ce46ad2ea6f2b72d43f7d47b13c3 # v8
        with:
          name: aarch64-unknown-linux-gnu-binary
          path: controller/linux/arm64

      - name: Build and Push
        id: build
        uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294 # v7
        with:
          context: controller/
          platforms: linux/amd64,linux/arm64
          file: controller/Dockerfile
          push: true
          tags: |
            ghcr.io/kguardian-dev/kguardian/controller:pr-${{ github.event.pull_request.number }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Update or create PR comment
        uses: actions/github-script@v7
        with:
          script: |
            const marker = '✅ Controller image built and pushed:';
            const digest = '${{ steps.build.outputs.digest }}';
            const body = `${marker}
            \`\`\`
            ghcr.io/kguardian-dev/kguardian/controller:pr-${{ github.event.pull_request.number }}
            \`\`\`
            **Digest:** \`${digest}\``;

            const comments = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.data.find(c => c.body.includes(marker));

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body: body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: body,
              });
            }

  # Build Broker
  build-broker:
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.broker == 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Cache Rust dependencies
        uses: actions/cache@cdf6c1fa76f9f475f3d7449005a359c84ca0f306 # v5
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            broker/target/
          key: ${{ runner.os }}-cargo-broker-${{ hashFiles('broker/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-broker-
            ${{ runner.os }}-cargo-

      - name: Set up QEMU
        uses: docker/setup-qemu-action@ce360397dd3f832beb865e1373c09c0e9f86d70a # v4
        with:
          platforms: all

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4
        with:
          install: true
          version: latest

      - name: Login to GHCR
        uses: docker/login-action@b45d80f862d83dbcd57f89517bcf500b2ab88fb2 # v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push
        id: build
        uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294 # v7
        with:
          context: broker/
          file: broker/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/kguardian-dev/kguardian/broker:pr-${{ github.event.pull_request.number }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Update or create PR comment
        uses: actions/github-script@v7
        with:
          script: |
            const marker = '✅ Broker image built and pushed:';
            const digest = '${{ steps.build.outputs.digest }}';
            const body = `${marker}
            \`\`\`
            ghcr.io/kguardian-dev/kguardian/broker:pr-${{ github.event.pull_request.number }}
            \`\`\`
            **Digest:** \`${digest}\``;

            const comments = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.data.find(c => c.body.includes(marker));

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body: body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: body,
              });
            }

  # Build Frontend
  build-frontend:
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.frontend == 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Cache Node modules
        uses: actions/cache@cdf6c1fa76f9f475f3d7449005a359c84ca0f306 # v5
        with:
          path: |
            ~/.npm
            frontend/node_modules
          key: ${{ runner.os }}-node-${{ hashFiles('frontend/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-

      - name: Set up QEMU
        uses: docker/setup-qemu-action@ce360397dd3f832beb865e1373c09c0e9f86d70a # v4
        with:
          platforms: all

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4
        with:
          install: true
          version: latest

      - name: Login to GHCR
        uses: docker/login-action@b45d80f862d83dbcd57f89517bcf500b2ab88fb2 # v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push
        id: build
        uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294 # v7
        with:
          context: frontend/
          file: frontend/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/kguardian-dev/kguardian/frontend:pr-${{ github.event.pull_request.number }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Update or create PR comment
        uses: actions/github-script@v7
        with:
          script: |
            const marker = '✅ Frontend image built and pushed:';
            const digest = '${{ steps.build.outputs.digest }}';
            const body = `${marker}
            \`\`\`
            ghcr.io/kguardian-dev/kguardian/frontend:pr-${{ github.event.pull_request.number }}
            \`\`\`
            **Digest:** \`${digest}\``;

            const comments = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.data.find(c => c.body.includes(marker));

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body: body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: body,
              });
            }

  # Build LLM Bridge
  build-llm-bridge:
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.llm-bridge == 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Cache Node modules
        uses: actions/cache@cdf6c1fa76f9f475f3d7449005a359c84ca0f306 # v5
        with:
          path: |
            ~/.npm
            llm-bridge/node_modules
          key: ${{ runner.os }}-node-llm-bridge-${{ hashFiles('llm-bridge/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-llm-bridge-
            ${{ runner.os }}-node-

      - name: Set up QEMU
        uses: docker/setup-qemu-action@ce360397dd3f832beb865e1373c09c0e9f86d70a # v4
        with:
          platforms: all

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4
        with:
          install: true
          version: latest

      - name: Login to GHCR
        uses: docker/login-action@b45d80f862d83dbcd57f89517bcf500b2ab88fb2 # v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push
        id: build
        uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294 # v7
        with:
          context: llm-bridge/
          file: llm-bridge/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/kguardian-dev/kguardian/llm-bridge:pr-${{ github.event.pull_request.number }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Update or create PR comment
        uses: actions/github-script@v7
        with:
          script: |
            const marker = '✅ LLM Bridge image built and pushed:';
            const digest = '${{ steps.build.outputs.digest }}';
            const body = `${marker}
            \`\`\`
            ghcr.io/kguardian-dev/kguardian/llm-bridge:pr-${{ github.event.pull_request.number }}
            \`\`\`
            **Digest:** \`${digest}\``;

            const comments = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.data.find(c => c.body.includes(marker));

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body: body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: body,
              });
            }

  # Build MCP Server
  build-mcp-server:
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.mcp-server == 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Cache Go modules
        uses: actions/cache@cdf6c1fa76f9f475f3d7449005a359c84ca0f306 # v5
        with:
          path: |
            ~/.cache/go-build
            ~/go/pkg/mod
          key: ${{ runner.os }}-go-mcp-server-${{ hashFiles('mcp-server/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-mcp-server-
            ${{ runner.os }}-go-

      - name: Set up QEMU
        uses: docker/setup-qemu-action@ce360397dd3f832beb865e1373c09c0e9f86d70a # v4
        with:
          platforms: all

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4
        with:
          install: true
          version: latest

      - name: Login to GHCR
        uses: docker/login-action@b45d80f862d83dbcd57f89517bcf500b2ab88fb2 # v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push
        id: build
        uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294 # v7
        with:
          context: mcp-server/
          file: mcp-server/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/kguardian-dev/kguardian/mcp-server:pr-${{ github.event.pull_request.number }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Update or create PR comment
        uses: actions/github-script@v7
        with:
          script: |
            const marker = '✅ MCP Server image built and pushed:';
            const digest = '${{ steps.build.outputs.digest }}';
            const body = `${marker}
            \`\`\`
            ghcr.io/kguardian-dev/kguardian/mcp-server:pr-${{ github.event.pull_request.number }}
            \`\`\`
            **Digest:** \`${digest}\``;

            const comments = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.data.find(c => c.body.includes(marker));

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body: body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: body,
              });
            }

  # Build and publish Helm chart for PR testing
  build-helm-chart:
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.charts == 'true' || needs.detect-changes.outputs.controller == 'true' || needs.detect-changes.outputs.broker == 'true' || needs.detect-changes.outputs.frontend == 'true' || needs.detect-changes.outputs.llm-bridge == 'true' || needs.detect-changes.outputs.mcp-server == 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Install Helm
        uses: azure/setup-helm@dda3372f752e03dde6b3237bc9431cdc2f7a02a2 # v5
        with:
          version: 'latest'

      - name: Login to GHCR
        uses: docker/login-action@b45d80f862d83dbcd57f89517bcf500b2ab88fb2 # v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Update Chart.yaml with PR version
        run: |
          cd charts/kguardian
          # Use PR number as version suffix
          CURRENT_VERSION=$(grep '^version:' Chart.yaml | awk '{print $2}')
          PR_VERSION="${CURRENT_VERSION}-pr${{ github.event.pull_request.number }}"
          sed -i "s/^version:.*/version: ${PR_VERSION}/" Chart.yaml
          echo "Updated chart version to: ${PR_VERSION}"
          cat Chart.yaml | grep version

      - name: Package Helm Chart
        run: |
          cd charts
          helm package kguardian

      - name: Push Helm Chart to GHCR
        run: |
          cd charts
          CHART_FILE=$(ls kguardian-*.tgz)
          helm push "${CHART_FILE}" oci://ghcr.io/kguardian-dev/charts

      - name: Update or create Helm chart comment
        uses: actions/github-script@v7
        with:
          script: |
            const marker = '✅ Helm chart built and pushed for testing:';
            const version = '${{ github.event.pull_request.number }}';
            const body = marker + '\n```bash\n# Install PR Helm chart\nhelm install kguardian oci://ghcr.io/kguardian-dev/charts/kguardian \\\n  --version $(helm search repo kguardian-dev/kguardian --versions | grep pr' + version + ' | head -1 | awk \'{print $2}\') \\\n  --namespace kguardian \\\n  --create-namespace\n\n# Or upgrade existing installation\nhelm upgrade kguardian oci://ghcr.io/kguardian-dev/charts/kguardian \\\n  --version $(helm search repo kguardian-dev/kguardian --versions | grep pr' + version + ' | head -1 | awk \'{print $2}\') \\\n  --namespace kguardian\n```';

            const comments = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.data.find(c => c.body.includes(marker));

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body: body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: body,
              });
            }

  # Summary comment with testing instructions
  pr-summary:
    runs-on: ubuntu-latest
    needs: [detect-changes, push-controller, build-broker, build-frontend, build-llm-bridge, build-mcp-server, build-helm-chart]
    if: always()
    steps:
      - name: Update or create summary comment
        uses: actions/github-script@v7
        with:
          script: |
            const marker = '## 🚀 PR Build Summary';
            const controller = '${{ needs.detect-changes.outputs.controller }}' === 'true';
            const broker = '${{ needs.detect-changes.outputs.broker }}' === 'true';
            const frontend = '${{ needs.detect-changes.outputs.frontend }}' === 'true';
            const llmBridge = '${{ needs.detect-changes.outputs.llm-bridge }}' === 'true';
            const mcpServer = '${{ needs.detect-changes.outputs.mcp-server }}' === 'true';
            const charts = '${{ needs.detect-changes.outputs.charts }}' === 'true';
            const helmBuilt = '${{ needs.build-helm-chart.result }}' === 'success';

            let body = marker + '\n\n';

            if (!controller && !broker && !frontend && !llmBridge && !mcpServer && !charts) {
              body += '⏭️ No component changes detected. Skipping builds.\n';
            } else {
              body += '### Built Images\n\n';

              if (controller) {
                body += '✅ **Controller**: `ghcr.io/kguardian-dev/kguardian/controller:pr-${{ github.event.pull_request.number }}`\n';
              }
              if (broker) {
                body += '✅ **Broker**: `ghcr.io/kguardian-dev/kguardian/broker:pr-${{ github.event.pull_request.number }}`\n';
              }
              if (frontend) {
                body += '✅ **Frontend**: `ghcr.io/kguardian-dev/kguardian/frontend:pr-${{ github.event.pull_request.number }}`\n';
              }
              if (llmBridge) {
                body += '✅ **LLM Bridge**: `ghcr.io/kguardian-dev/kguardian/llm-bridge:pr-${{ github.event.pull_request.number }}`\n';
              }
              if (mcpServer) {
                body += '✅ **MCP Server**: `ghcr.io/kguardian-dev/kguardian/mcp-server:pr-${{ github.event.pull_request.number }}`\n';
              }

              body += '\n### 🧪 Testing Instructions\n\n';

              if (helmBuilt) {
                body += '**Option 1: Use PR Helm Chart (Recommended)**\n';
                body += 'A complete Helm chart with all PR changes has been published:\n```bash\n';
                body += '# Find the exact version\n';
                body += 'helm search repo oci://ghcr.io/kguardian-dev/charts --versions | grep pr${{ github.event.pull_request.number }}\n\n';
                body += '# Install with PR chart\n';
                body += 'helm install kguardian oci://ghcr.io/kguardian-dev/charts/kguardian \\\n';
                body += '  --version <VERSION-FROM-ABOVE> \\\n';
                body += '  --namespace kguardian \\\n';
                body += '  --create-namespace \\\n';
                body += '  --wait\n';
                body += '```\n\n';
              }

              body += '**Option 2: Use Released Chart with PR Images**\n';
              body += '```bash\n';
              body += 'helm upgrade --install kguardian oci://ghcr.io/kguardian-dev/charts/kguardian \\\n';
              body += '  --namespace kguardian \\\n';
              body += '  --create-namespace \\\n';

              if (controller) {
                body += '  --set controller.image.tag=pr-${{ github.event.pull_request.number }} \\\n';
              }
              if (broker) {
                body += '  --set broker.image.tag=pr-${{ github.event.pull_request.number }} \\\n';
              }
              if (frontend) {
                body += '  --set frontend.image.tag=pr-${{ github.event.pull_request.number }} \\\n';
              }
              if (llmBridge) {
                body += '  --set llmBridge.enabled=true \\\n';
                body += '  --set llmBridge.image.tag=pr-${{ github.event.pull_request.number }} \\\n';
              }
              if (mcpServer) {
                body += '  --set mcpServer.enabled=true \\\n';
                body += '  --set mcpServer.image.tag=pr-${{ github.event.pull_request.number }} \\\n';
              }

              body += '  --wait\n';
              body += '```\n';
            }

            const comments = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.data.find(c => c.body.includes(marker));

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body: body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: body,
              });
            }
