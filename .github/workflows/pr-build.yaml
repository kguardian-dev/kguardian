---
# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
name: Build PR Docker Images

on:
  pull_request:
    branches:
      - main
    paths:
      - 'controller/**'
      - 'broker/**'
      - 'frontend/**'
      - 'llm-bridge/**'
      - 'mcp-server/**'
      - 'evaluator/**'
      - 'charts/**'
      - '.github/workflows/pr-build.yaml'

permissions:
  contents: read
  packages: write
  pull-requests: write

jobs:
  # Detect which components changed
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      controller: ${{ steps.changes.outputs.controller }}
      broker: ${{ steps.changes.outputs.broker }}
      frontend: ${{ steps.changes.outputs.frontend }}
      llm-bridge: ${{ steps.changes.outputs.llm-bridge }}
      mcp-server: ${{ steps.changes.outputs.mcp-server }}
      evaluator: ${{ steps.changes.outputs.evaluator }}
      charts: ${{ steps.changes.outputs.charts }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 2  # Fetch enough history to compare with previous commit

      - uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4
        id: changes
        with:
          # Compare HEAD with previous commit (HEAD~1) to only detect changes in latest push
          base: HEAD~1
          filters: |
            controller:
              - 'controller/**'
            broker:
              - 'broker/**'
            frontend:
              - 'frontend/**'
            llm-bridge:
              - 'llm-bridge/**'
            mcp-server:
              - 'mcp-server/**'
            evaluator:
              - 'evaluator/**'
            charts:
              - 'charts/**'

  # Build Controller
  build-controller:
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.controller == 'true'
    strategy:
      matrix:
        arch:
          - linux/amd64
          - linux/arm64
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Install Rust nightly
        uses: dtolnay/rust-toolchain@67ef31d5b988238dd797d409d6f9574278e20537 # master
        with:
          toolchain: nightly
          targets: x86_64-unknown-linux-musl
          components: rustfmt, clippy, miri, rust-src

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@67ef31d5b988238dd797d409d6f9574278e20537 # master
        with:
          toolchain: stable
          targets: x86_64-unknown-linux-musl
          components: rustfmt, clippy

      - name: Cache Rust dependencies
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            controller/target/
          key: ${{ runner.os }}-cargo-${{ matrix.arch }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-${{ matrix.arch }}-
            ${{ runner.os }}-cargo-

      - name: Set Build Arguments
        id: args
        run: |
          if [ "${{ matrix.arch }}" == "linux/arm64" ]; then
            echo "BUILD=aarch64-unknown-linux-gnu" >> $GITHUB_OUTPUT
          else
            echo "BUILD=x86_64-unknown-linux-gnu" >> $GITHUB_OUTPUT
          fi

      - name: Build Rust
        run: |
          sudo apt update -y
          sudo apt install linux-tools-common linux-tools-generic linux-tools-$(uname -r) -y
          cd controller
          cargo install cross --git https://github.com/cross-rs/cross --force
          cross build --target ${{ steps.args.outputs.BUILD }} --release

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: ${{ steps.args.outputs.BUILD }}-binary
          path: controller/target/${{ steps.args.outputs.BUILD }}/release/kguardian
          retention-days: 7

  push-controller:
    runs-on: ubuntu-latest
    needs: build-controller
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Set up QEMU
        uses: docker/setup-qemu-action@06116385d9baf250c9f4dcb4858b16962ea869c3 # v4
        with:
          platforms: all

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4
        with:
          install: true
          version: latest

      - name: Login to GHCR
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: x86_64-unknown-linux-gnu-binary
          path: controller/linux/amd64

      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: aarch64-unknown-linux-gnu-binary
          path: controller/linux/arm64

      - name: Build and Push
        id: build
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7
        with:
          context: controller/
          platforms: linux/amd64,linux/arm64
          file: controller/Dockerfile
          push: true
          tags: |
            ghcr.io/kguardian-dev/kguardian/controller:pr-${{ github.event.pull_request.number }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Update or create PR comment
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9
        with:
          script: |
            const marker = '✅ Controller image built and pushed:';
            const digest = '${{ steps.build.outputs.digest }}';
            const body = `${marker}
            \`\`\`
            ghcr.io/kguardian-dev/kguardian/controller:pr-${{ github.event.pull_request.number }}
            \`\`\`
            **Digest:** \`${digest}\``;

            const comments = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.data.find(c => c.body.includes(marker));

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body: body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: body,
              });
            }

  # Lint + test Controller (cargo fmt / clippy / test).
  # Runs in parallel with build-controller and intentionally is NOT a
  # dependency of push-controller or pr-summary — failing tests must not
  # block image publication for downstream PR validation.
  test-controller:
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.controller == 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Install system dependencies
        # Mirrors controller/Cross.toml pre-build deps. Needed for the
        # libbpf-cargo build script (clang + libelf), libseccomp-sys and
        # the openssl(vendored)/protobuf toolchain.
        run: |
          sudo apt-get update -y
          sudo apt-get install -y --no-install-recommends \
            build-essential \
            clang \
            libelf-dev \
            libseccomp-dev \
            libbpf-dev \
            zlib1g-dev \
            pkg-config \
            protobuf-compiler

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@67ef31d5b988238dd797d409d6f9574278e20537 # master
        with:
          toolchain: stable
          components: rustfmt, clippy

      - name: Cache Rust dependencies
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            controller/target/
          key: ${{ runner.os }}-cargo-controller-test-${{ hashFiles('controller/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-controller-test-
            ${{ runner.os }}-cargo-controller-

      - name: cargo fmt --check
        working-directory: controller
        run: cargo fmt --all -- --check

      - name: cargo clippy
        working-directory: controller
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: cargo test
        working-directory: controller
        # Controller tests are safe under default parallel scheduling.
        run: cargo test --all-features

  # Build Broker
  build-broker:
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.broker == 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Cache Rust dependencies
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            broker/target/
          key: ${{ runner.os }}-cargo-broker-${{ hashFiles('broker/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-broker-
            ${{ runner.os }}-cargo-

      - name: Set up QEMU
        uses: docker/setup-qemu-action@06116385d9baf250c9f4dcb4858b16962ea869c3 # v4
        with:
          platforms: all

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4
        with:
          install: true
          version: latest

      - name: Login to GHCR
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push
        id: build
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7
        with:
          context: broker/
          file: broker/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/kguardian-dev/kguardian/broker:pr-${{ github.event.pull_request.number }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Update or create PR comment
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9
        with:
          script: |
            const marker = '✅ Broker image built and pushed:';
            const digest = '${{ steps.build.outputs.digest }}';
            const body = `${marker}
            \`\`\`
            ghcr.io/kguardian-dev/kguardian/broker:pr-${{ github.event.pull_request.number }}
            \`\`\`
            **Digest:** \`${digest}\``;

            const comments = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.data.find(c => c.body.includes(marker));

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body: body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: body,
              });
            }

  # Lint + test Broker (cargo fmt / clippy / test).
  # Runs in parallel with build-broker and intentionally is NOT a
  # dependency of build-broker or pr-summary — failing tests must not
  # block image publication for downstream PR validation.
  #
  # NOTE: broker/src/audit.rs and broker/src/conn.rs contain unit tests that
  # mutate process env vars (AUDIT_INFLIGHT_PERMITS, AUDIT_EVAL_TIMEOUT_MS,
  # EVALUATOR_URL, DATABASE_URL whitespace) and race under cargo's default
  # parallel scheduler. We pin to a single test thread as a pragmatic
  # mitigation; the proper fix is to migrate those tests to the
  # `serial_test` crate and mark them `#[serial]` (tracked separately).
  test-broker:
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.broker == 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Install system dependencies
        # diesel-postgres links against libpq at build time; libpq5 in the
        # runtime Dockerfile is not enough for `cargo test`.
        run: |
          sudo apt-get update -y
          sudo apt-get install -y --no-install-recommends \
            build-essential \
            libpq-dev \
            pkg-config

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@67ef31d5b988238dd797d409d6f9574278e20537 # master
        with:
          toolchain: stable
          components: rustfmt, clippy

      - name: Cache Rust dependencies
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            broker/target/
          key: ${{ runner.os }}-cargo-broker-test-${{ hashFiles('broker/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-broker-test-
            ${{ runner.os }}-cargo-broker-

      - name: cargo fmt --check
        working-directory: broker
        run: cargo fmt --all -- --check

      - name: cargo clippy
        working-directory: broker
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: cargo test
        working-directory: broker
        # See job-level NOTE: env-mutating tests require --test-threads=1.
        run: cargo test --all-features -- --test-threads=1

  # Build Frontend
  build-frontend:
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.frontend == 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Cache Node modules
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6
        with:
          path: |
            ~/.npm
            frontend/node_modules
          key: ${{ runner.os }}-node-${{ hashFiles('frontend/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-

      - name: Set up QEMU
        uses: docker/setup-qemu-action@06116385d9baf250c9f4dcb4858b16962ea869c3 # v4
        with:
          platforms: all

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4
        with:
          install: true
          version: latest

      - name: Login to GHCR
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push
        id: build
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7
        with:
          context: frontend/
          file: frontend/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/kguardian-dev/kguardian/frontend:pr-${{ github.event.pull_request.number }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Update or create PR comment
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9
        with:
          script: |
            const marker = '✅ Frontend image built and pushed:';
            const digest = '${{ steps.build.outputs.digest }}';
            const body = `${marker}
            \`\`\`
            ghcr.io/kguardian-dev/kguardian/frontend:pr-${{ github.event.pull_request.number }}
            \`\`\`
            **Digest:** \`${digest}\``;

            const comments = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.data.find(c => c.body.includes(marker));

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body: body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: body,
              });
            }

  # Build LLM Bridge
  build-llm-bridge:
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.llm-bridge == 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Cache Node modules
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6
        with:
          path: |
            ~/.npm
            llm-bridge/node_modules
          key: ${{ runner.os }}-node-llm-bridge-${{ hashFiles('llm-bridge/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-llm-bridge-
            ${{ runner.os }}-node-

      - name: Set up QEMU
        uses: docker/setup-qemu-action@06116385d9baf250c9f4dcb4858b16962ea869c3 # v4
        with:
          platforms: all

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4
        with:
          install: true
          version: latest

      - name: Login to GHCR
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push
        id: build
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7
        with:
          context: llm-bridge/
          file: llm-bridge/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/kguardian-dev/kguardian/llm-bridge:pr-${{ github.event.pull_request.number }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Update or create PR comment
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9
        with:
          script: |
            const marker = '✅ LLM Bridge image built and pushed:';
            const digest = '${{ steps.build.outputs.digest }}';
            const body = `${marker}
            \`\`\`
            ghcr.io/kguardian-dev/kguardian/llm-bridge:pr-${{ github.event.pull_request.number }}
            \`\`\`
            **Digest:** \`${digest}\``;

            const comments = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.data.find(c => c.body.includes(marker));

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body: body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: body,
              });
            }

  # Build MCP Server
  build-mcp-server:
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.mcp-server == 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Cache Go modules
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6
        with:
          path: |
            ~/.cache/go-build
            ~/go/pkg/mod
          key: ${{ runner.os }}-go-mcp-server-${{ hashFiles('mcp-server/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-mcp-server-
            ${{ runner.os }}-go-

      - name: Set up QEMU
        uses: docker/setup-qemu-action@06116385d9baf250c9f4dcb4858b16962ea869c3 # v4
        with:
          platforms: all

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4
        with:
          install: true
          version: latest

      - name: Login to GHCR
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push
        id: build
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7
        with:
          context: mcp-server/
          file: mcp-server/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/kguardian-dev/kguardian/mcp-server:pr-${{ github.event.pull_request.number }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Update or create PR comment
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9
        with:
          script: |
            const marker = '✅ MCP Server image built and pushed:';
            const digest = '${{ steps.build.outputs.digest }}';
            const body = `${marker}
            \`\`\`
            ghcr.io/kguardian-dev/kguardian/mcp-server:pr-${{ github.event.pull_request.number }}
            \`\`\`
            **Digest:** \`${digest}\``;

            const comments = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.data.find(c => c.body.includes(marker));

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body: body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: body,
              });
            }

  # Build Evaluator
  build-evaluator:
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.evaluator == 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Cache Go modules
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6
        with:
          path: |
            ~/.cache/go-build
            ~/go/pkg/mod
          key: ${{ runner.os }}-go-evaluator-${{ hashFiles('evaluator/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-evaluator-
            ${{ runner.os }}-go-

      - name: Set up QEMU
        uses: docker/setup-qemu-action@06116385d9baf250c9f4dcb4858b16962ea869c3 # v4
        with:
          platforms: all

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4
        with:
          install: true
          version: latest

      - name: Login to GHCR
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push
        id: build
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7
        with:
          context: evaluator/
          file: evaluator/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/kguardian-dev/kguardian/evaluator:pr-${{ github.event.pull_request.number }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Update or create PR comment
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9
        with:
          script: |
            const marker = '✅ Evaluator image built and pushed:';
            const digest = '${{ steps.build.outputs.digest }}';
            const body = `${marker}
            \`\`\`
            ghcr.io/kguardian-dev/kguardian/evaluator:pr-${{ github.event.pull_request.number }}
            \`\`\`
            **Digest:** \`${digest}\``;

            const comments = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.data.find(c => c.body.includes(marker));

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body: body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: body,
              });
            }

  # Build and publish Helm chart for PR testing
  build-helm-chart:
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.charts == 'true' || needs.detect-changes.outputs.controller == 'true' || needs.detect-changes.outputs.broker == 'true' || needs.detect-changes.outputs.frontend == 'true' || needs.detect-changes.outputs.llm-bridge == 'true' || needs.detect-changes.outputs.mcp-server == 'true' || needs.detect-changes.outputs.evaluator == 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Install Helm
        uses: azure/setup-helm@9bc31f4ebc9c6b171d7bfbaa5d006ae7abdb4310 # v5
        with:
          version: 'latest'

      - name: Login to GHCR
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Update Chart.yaml with PR version
        run: |
          cd charts/kguardian
          # Use PR number as version suffix
          CURRENT_VERSION=$(grep '^version:' Chart.yaml | awk '{print $2}')
          PR_VERSION="${CURRENT_VERSION}-pr${{ github.event.pull_request.number }}"
          sed -i "s/^version:.*/version: ${PR_VERSION}/" Chart.yaml
          echo "Updated chart version to: ${PR_VERSION}"
          cat Chart.yaml | grep version

      - name: Package Helm Chart
        run: |
          cd charts
          helm package kguardian

      - name: Push Helm Chart to GHCR
        run: |
          cd charts
          CHART_FILE=$(ls kguardian-*.tgz)
          helm push "${CHART_FILE}" oci://ghcr.io/kguardian-dev/charts

      - name: Update or create Helm chart comment
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9
        with:
          script: |
            const marker = '✅ Helm chart built and pushed for testing:';
            const version = '${{ github.event.pull_request.number }}';
            const body = marker + '\n```bash\n# Install PR Helm chart\nhelm install kguardian oci://ghcr.io/kguardian-dev/charts/kguardian \\\n  --version $(helm search repo kguardian-dev/kguardian --versions | grep pr' + version + ' | head -1 | awk \'{print $2}\') \\\n  --namespace kguardian \\\n  --create-namespace\n\n# Or upgrade existing installation\nhelm upgrade kguardian oci://ghcr.io/kguardian-dev/charts/kguardian \\\n  --version $(helm search repo kguardian-dev/kguardian --versions | grep pr' + version + ' | head -1 | awk \'{print $2}\') \\\n  --namespace kguardian\n```';

            const comments = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.data.find(c => c.body.includes(marker));

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body: body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: body,
              });
            }

  # Summary comment with testing instructions
  pr-summary:
    runs-on: ubuntu-latest
    needs: [detect-changes, push-controller, build-broker, build-frontend, build-llm-bridge, build-mcp-server, build-evaluator, build-helm-chart]
    if: always()
    steps:
      - name: Update or create summary comment
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9
        with:
          script: |
            const marker = '## 🚀 PR Build Summary';
            const controller = '${{ needs.detect-changes.outputs.controller }}' === 'true';
            const broker = '${{ needs.detect-changes.outputs.broker }}' === 'true';
            const frontend = '${{ needs.detect-changes.outputs.frontend }}' === 'true';
            const llmBridge = '${{ needs.detect-changes.outputs.llm-bridge }}' === 'true';
            const mcpServer = '${{ needs.detect-changes.outputs.mcp-server }}' === 'true';
            const evaluator = '${{ needs.detect-changes.outputs.evaluator }}' === 'true';
            const charts = '${{ needs.detect-changes.outputs.charts }}' === 'true';
            const helmBuilt = '${{ needs.build-helm-chart.result }}' === 'success';

            let body = marker + '\n\n';

            if (!controller && !broker && !frontend && !llmBridge && !mcpServer && !evaluator && !charts) {
              body += '⏭️ No component changes detected. Skipping builds.\n';
            } else {
              body += '### Built Images\n\n';

              if (controller) {
                body += '✅ **Controller**: `ghcr.io/kguardian-dev/kguardian/controller:pr-${{ github.event.pull_request.number }}`\n';
              }
              if (broker) {
                body += '✅ **Broker**: `ghcr.io/kguardian-dev/kguardian/broker:pr-${{ github.event.pull_request.number }}`\n';
              }
              if (frontend) {
                body += '✅ **Frontend**: `ghcr.io/kguardian-dev/kguardian/frontend:pr-${{ github.event.pull_request.number }}`\n';
              }
              if (llmBridge) {
                body += '✅ **LLM Bridge**: `ghcr.io/kguardian-dev/kguardian/llm-bridge:pr-${{ github.event.pull_request.number }}`\n';
              }
              if (mcpServer) {
                body += '✅ **MCP Server**: `ghcr.io/kguardian-dev/kguardian/mcp-server:pr-${{ github.event.pull_request.number }}`\n';
              }
              if (evaluator) {
                body += '✅ **Evaluator**: `ghcr.io/kguardian-dev/kguardian/evaluator:pr-${{ github.event.pull_request.number }}`\n';
              }

              body += '\n### 🧪 Testing Instructions\n\n';

              if (helmBuilt) {
                body += '**Option 1: Use PR Helm Chart (Recommended)**\n';
                body += 'A complete Helm chart with all PR changes has been published:\n```bash\n';
                body += '# Find the exact version\n';
                body += 'helm search repo oci://ghcr.io/kguardian-dev/charts --versions | grep pr${{ github.event.pull_request.number }}\n\n';
                body += '# Install with PR chart\n';
                body += 'helm install kguardian oci://ghcr.io/kguardian-dev/charts/kguardian \\\n';
                body += '  --version <VERSION-FROM-ABOVE> \\\n';
                body += '  --namespace kguardian \\\n';
                body += '  --create-namespace \\\n';
                body += '  --wait\n';
                body += '```\n\n';
              }

              body += '**Option 2: Use Released Chart with PR Images**\n';
              body += '```bash\n';
              body += 'helm upgrade --install kguardian oci://ghcr.io/kguardian-dev/charts/kguardian \\\n';
              body += '  --namespace kguardian \\\n';
              body += '  --create-namespace \\\n';

              if (controller) {
                body += '  --set controller.image.tag=pr-${{ github.event.pull_request.number }} \\\n';
              }
              if (broker) {
                body += '  --set broker.image.tag=pr-${{ github.event.pull_request.number }} \\\n';
              }
              if (frontend) {
                body += '  --set frontend.image.tag=pr-${{ github.event.pull_request.number }} \\\n';
              }
              if (llmBridge) {
                body += '  --set llmBridge.enabled=true \\\n';
                body += '  --set llmBridge.image.tag=pr-${{ github.event.pull_request.number }} \\\n';
              }
              if (mcpServer) {
                body += '  --set mcpServer.enabled=true \\\n';
                body += '  --set mcpServer.image.tag=pr-${{ github.event.pull_request.number }} \\\n';
              }

              body += '  --wait\n';
              body += '```\n';
            }

            const comments = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.data.find(c => c.body.includes(marker));

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body: body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: body,
              });
            }
