---
# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
name: "Charts: Release to GHCR OCI"

on:
  workflow_dispatch: {}
  push:
    tags:
      - "chart/v*"

env:
  CHARTS_SRC_DIR: "kguardian"
  TARGET_REGISTRY: ghcr.io

jobs:
  release-charts:
    name: Release Charts
    runs-on: ubuntu-latest
    permissions: write-all
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
        with:
          fetch-depth: 0

      - name: Configure Git
        run: |
          git config user.name "$GITHUB_ACTOR"
          git config user.email "$GITHUB_ACTOR@users.noreply.github.com"

      - name: Login to GitHub Container Registry
        uses: docker/login-action@abd2ef45e78c5afb21d64d4ca52ee8550d9572c7 # v4
        with:
          registry: ${{ env.TARGET_REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Install Helm
        uses: azure/setup-helm@9bc31f4ebc9c6b171d7bfbaa5d006ae7abdb4310 # v5

      - name: Publish Helm Chart to GHCR
        run: |
          helm package charts/${{ env.CHARTS_SRC_DIR }}
          helm push kguardian-*.tgz oci://${{ env.TARGET_REGISTRY }}/${{ github.repository_owner }}/charts
        env:
          GITHUB_TOKEN: "${{ secrets.GITHUB_TOKEN }}"
