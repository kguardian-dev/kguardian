---
# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
name: Build and Push Broker Docker Images

on:
  workflow_dispatch:
  push:
    tags:
      - "broker/v*"

jobs:
  build_and_push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Cache Rust dependencies
        uses: actions/cache@cdf6c1fa76f9f475f3d7449005a359c84ca0f306 # v5
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            broker/target/
          key: ${{ runner.os }}-cargo-broker-${{ hashFiles('broker/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-broker-
            ${{ runner.os }}-cargo-

      - name: Set up QEMU
        uses: docker/setup-qemu-action@ce360397dd3f832beb865e1373c09c0e9f86d70a # v4
        with:
          platforms: all

      - name: Set up Docker Buildx
        id: buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3
        with:
          install: true
          version: latest

      - name: Login to GHCR
        uses: docker/login-action@b45d80f862d83dbcd57f89517bcf500b2ab88fb2 # v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract tag name
        id: extract_tag
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          VERSION="${TAG#broker/}"
          echo "TAG_NAME=${VERSION}" >> $GITHUB_OUTPUT

      - name: Build and Push
        uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294 # v7
        with:
          context: broker/
          file: broker/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/kguardian-dev/kguardian/broker:${{ steps.extract_tag.outputs.TAG_NAME }}
            ghcr.io/kguardian-dev/kguardian/broker:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
